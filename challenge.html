<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Coding Challenge | LearnX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* --- THEME: BLACK & NEON GREEN --- */
        :root {
            --bg-dark: #0d0d0d;
            --editor-bg: #1e1e1e;
            --neon-green: #00ff88;
            --border: 1px solid #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        html, body {
            background: var(--bg-dark);
            color: white;
            height: 100%;
            min-height: 100vh;
        }

        body {
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ── Top Header Bar (replaces sidebar on mobile) ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            height: 50px;
            background: #141414;
            border-bottom: var(--border);
            flex-shrink: 0;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .top-bar-logo {
            font-size: 18px;
            font-weight: 700;
            color: var(--neon-green);
            letter-spacing: 1px;
        }

        .task-title {
            font-weight: 600;
            font-size: clamp(11px, 2vw, 14px);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .task-title span {
            color: var(--neon-green);
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hint-btn {
            background: #333;
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }

        .hint-btn:hover {
            background: #444;
            color: #ffd700;
        }

        .back-btn {
            background: #1e1e1e;
            color: #aaa;
            border: var(--border);
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
            white-space: nowrap;
        }

        .back-btn:hover { color: white; background: #2a2a2a; }

        /* ── Main Area ── */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        /* ── Workspace: 2-column on desktop, stacked on mobile ── */
        .workspace {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 0;
        }

        .editor-container {
            background: var(--editor-bg);
            border-right: var(--border);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .panel-header {
            background: #252526;
            padding: 8px 15px;
            font-size: 12px;
            color: #ccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        textarea {
            flex: 1;
            background: var(--editor-bg);
            color: #d4d4d4;
            border: none;
            padding: 16px;
            font-family: 'Fira Code', monospace;
            font-size: clamp(12px, 1.5vw, 14px);
            resize: none;
            outline: none;
            line-height: 1.6;
            min-height: 0;
        }

        .run-btn {
            background: var(--neon-green);
            color: black;
            border: none;
            padding: 5px 14px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .run-btn:hover { background: #00e67a; }

        /* ── Preview Panel ── */
        .preview-container {
            background: #000;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        iframe {
            flex: 1;
            background: white;
            border: none;
            min-height: 0;
        }

        .target-box {
            height: clamp(160px, 28vh, 260px);
            background: #111;
            border-top: var(--border);
            padding: 10px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .target-visual {
            flex: 1;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            position: relative;
        }

        .target-tag {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #000;
            color: white;
            padding: 2px 6px;
            font-size: 10px;
            border-radius: 3px;
            opacity: 0.7;
        }

        /* ── Success Modal ── */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .modal-box {
            background: #111;
            padding: clamp(24px, 5vw, 40px);
            border-radius: 12px;
            text-align: center;
            border: 2px solid var(--neon-green);
            width: 100%;
            max-width: 420px;
            box-shadow: 0 0 50px rgba(0,255,136,0.2);
            animation: popUp 0.4s ease;
        }

        @keyframes popUp {
            from { transform: scale(0.8); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }

        .input-name {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            background: #222;
            border: 1px solid #444;
            color: white;
            text-align: center;
            border-radius: 6px;
            outline: none;
            font-size: 15px;
        }

        .input-name:focus { border-color: var(--neon-green); }

        /* ── Responsive ── */

        /* Tablet: keep side-by-side but shrink target box */
        @media (max-width: 768px) {
            .workspace {
                grid-template-columns: 1fr 1fr;
            }
            .target-box {
                height: clamp(140px, 22vh, 200px);
            }
            textarea {
                font-size: 12px;
                padding: 10px;
            }
        }

        /* Mobile: stack editor on top of preview */
        @media (max-width: 540px) {
            .workspace {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
            }
            .editor-container {
                border-right: none;
                border-bottom: var(--border);
            }
            .target-box {
                height: 120px;
            }
            .task-title {
                display: none; /* too cramped on very small screens */
            }
        }
    </style>
</head>

<body>

    <!-- Unified top bar (replaces sidebar on all screen sizes) -->
    <div class="top-bar">
        <div class="top-bar-left">
            <span class="top-bar-logo">LearnX</span>
            <div class="task-title">Challenge: <span>Match the Target Style</span></div>
        </div>
        <div class="top-bar-right">
            <button class="hint-btn" onclick="showHint()"><i class="fas fa-lightbulb"></i> Hint</button>
            <a href="course.html?course=CSS" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
        </div>
    </div>

    <!-- Main editor + preview area -->
    <div class="main-area">
        <div class="workspace">
            <!-- Editor -->
            <div class="editor-container">
                <div class="panel-header">
                    style.css
                    <button class="run-btn" onclick="runCode()"><i class="fas fa-play"></i> RUN</button>
                </div>
                <textarea id="codeArea">body {
  display: flex; justify-content: center;
  align-items: center; height: 100vh;
  font-family: sans-serif;
}

.btn {
  padding: 15px 40px;
  font-size: 20px;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;

  /* --- FIX THIS CODE --- */
  background-color: red;  /* Hint: Use #00ff88 */
  color: white;           /* Hint: Use black */
}
                </textarea>
            </div>

            <!-- Preview -->
            <div class="preview-container">
                <div class="panel-header">Your Output</div>
                <iframe id="userFrame"></iframe>
                <div class="target-box">
                    <div class="panel-header" style="background:transparent; padding:0 0 6px 0;">Target Output</div>
                    <div class="target-visual">
                        <div class="target-tag">TARGET</div>
                        <button style="padding: 15px 40px; font-size: 20px; border: none; border-radius: 6px; font-weight: bold; background-color: #00ff88; color: black; font-family: sans-serif;">Download</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal" id="successModal">
        <div class="modal-box">
            <i class="fas fa-trophy" style="font-size: 52px; color: #ffd700; margin-bottom: 16px;"></i>
            <h2 style="color: white; font-size: clamp(1.1rem,4vw,1.5rem);">Excellent Work!</h2>
            <p style="color: #aaa; font-size: 14px; margin-top: 6px;">Code Matched Perfectly 🎉</p>
            <input type="text" id="userName" class="input-name" placeholder="Enter your full name for the certificate">
            <button class="run-btn" style="width:100%; padding:14px; font-size:14px; justify-content:center;" onclick="goToCert()">
                Get Certificate &nbsp;<i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <script>
        function runCode() {
            const code = document.getElementById('codeArea').value;
            const iframe = document.getElementById('userFrame');
            const doc = iframe.contentDocument || iframe.contentWindow.document;

            doc.open();
            doc.write(`<style>${code}</style><button class="btn" id="testBtn">Download</button>`);
            doc.close();

            setTimeout(() => { validate(iframe); }, 100);
        }

        function validate(iframe) {
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            const btn = doc.getElementById('testBtn');
            if (!btn) return;

            const style = window.getComputedStyle(btn);
            const bg  = style.backgroundColor;
            const col = style.color;

            const isGreen = (bg === 'rgb(0, 255, 136)' || bg === '#00ff88');
            const isBlack = (col === 'rgb(0, 0, 0)' || col === 'black' || col === '#000000');

            if (isGreen && isBlack) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                setTimeout(() => {
                    document.getElementById('successModal').style.display = 'flex';
                }, 800);
            } else {
                const editor = document.querySelector('.editor-container');
                editor.style.boxShadow = "inset 0 0 20px rgba(255, 0, 0, 0.5)";
                setTimeout(() => editor.style.boxShadow = "none", 400);
            }
        }

        function showHint() {
            alert("HINT:\n1. Change background-color to: #00ff88\n2. Change color to: black");
        }

        function goToCert() {
            const name = document.getElementById('userName').value.trim();
            if (!name) return alert("Please enter your name!");
            window.location.href = `certificate.html?name=${encodeURIComponent(name)}`;
        }

        runCode(); // Initial preview
    </script>
</body>

</html>
