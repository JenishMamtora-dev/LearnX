<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>LearnX Admin Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="icon" href="logo.png" type="image/png">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* CSS VARIABLES FOR EASY THEMING */
        :root {
            --primary: #4CAF50;
            --bg: #121212;
            --panel: #1E1E1E;
            --text: #E0E0E0;
            --danger: #ff4d4d;
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        /* UTILITIES */
        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: white;
            font-size: 14px;
        }

        .btn-green {
            background: var(--primary);
        }

        .btn-red {
            background: var(--danger);
        }

        .btn-sm {
            padding: 5px 8px;
            font-size: 12px;
            margin-left: 5px;
        }

        /* LOGIN */
        #login {
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: var(--panel);
            padding: 40px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .login-box h2 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #2a2a2a;
            color: white;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 70px;
            height: 100%;
            background: var(--panel);
            padding: 15px;
            transition: width 0.3s ease;
            z-index: 1000;
            overflow: hidden;
        }

        .sidebar:hover {
            width: 240px;
        }

        .sidebar.collapsed {
            width: 70px;
        }

        .sidebar .logo {
            font-size: 24px;
            font-weight: bold;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar span {
            color: var(--primary);
        }

        .toggle {
            position: absolute;
            right: -12px;
            top: 25px;
            background: var(--primary);
            color: white;
            padding: 5px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid var(--bg);
            display: none;
        }

        .menu a {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            margin-top: 5px;
            border-radius: 8px;
            color: #aaa;
            text-decoration: none;
            transition: 0.2s;
            cursor: pointer;
        }

        .menu a:hover,
        .menu a.active {
            background: rgba(76, 175, 80, 0.1);
            color: var(--primary);
        }

        .menu a i {
            font-size: 20px;
        }

        .sidebar.collapsed .text,
        .sidebar.collapsed .logo-text,
        .sidebar:not(:hover) .text,
        .sidebar:not(:hover) .logo-text {
            display: none;
        }

        .sidebar.collapsed a,
        .sidebar:not(:hover) a {
            justify-content: center;
        }

        /* CONTENT */
        .content {
            margin-left: 240px;
            padding: 30px;
            transition: .3s;
        }

        .sidebar.collapsed~.content {
            margin-left: 70px;
        }

        /* DASHBOARD CARDS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card-stat {
            background: var(--panel);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 3px solid var(--primary);
        }

        .card-stat i {
            font-size: 30px;
            color: var(--primary);
        }

        .card-stat h3 {
            margin: 0;
            font-size: 24px;
        }

        .card-stat p {
            margin: 0;
            font-size: 14px;
            color: #888;
        }

        /* TABLES & FORMS */
        .section {
            display: none;
            animation: fadeIn 0.3s;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .panel-card {
            background: var(--panel);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            text-align: left;
            color: #888;
            font-size: 13px;
            text-transform: uppercase;
            padding: 10px;
            border-bottom: 1px solid #333;
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid #2a2a2a;
            color: #ddd;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        /* NOTIFICATION TOAST */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 4px;
            padding: 12px;
            position: fixed;
            z-index: 1;
            right: 30px;
            bottom: 30px;
            border-left: 5px solid var(--primary);
            font-size: 15px;
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein {
            from {
                bottom: 0;
                opacity: 0;
            }

            to {
                bottom: 30px;
                opacity: 1;
            }
        }

        @keyframes fadeout {
            from {
                bottom: 30px;
                opacity: 1;
            }

            to {
                bottom: 0;
                opacity: 0;
            }
        }

        .logo{
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .panel-card {
            background: var(--panel);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        /* RESPONSIVE DESIGN */
        @media (max-width: 768px) {
            .sidebar { width: 60px; padding: 15px 10px; }
            .sidebar:hover { width: 60px; } /* Disable auto expand on mobile */
            .sidebar .logo-text, .sidebar .text { display: none !important; }
            .sidebar .menu a { justify-content: center; padding: 12px 0; }
            .content { margin-left: 60px; padding: 15px; }
            .sidebar.collapsed~.content { margin-left: 60px; }
            .stats-grid { grid-template-columns: 1fr; gap: 15px; }
            .header-flex { flex-direction: column; align-items: flex-start; gap: 10px; }
            .header-flex input { width: 100% !important; max-width: 300px; }
            .login-box { width: 90%; padding: 25px; }
        }
    </style>
</head>

<body>

    <div id="toast">Operation Successful</div>

    <div id="login">
        <div class="login-box">
            <h2><i class='bx bxs-lock-alt'></i> Admin Panel</h2>
            <input id="user" placeholder="Email Address">
            <input id="pass" type="password" placeholder="Password">
            <button class="btn btn-green" style="width:100%; margin-top:20px" onclick="login()">LOGIN</button>
            <p style="color:red; text-align:center; display:none" id="loginError">Invalid Email or Password</p>
        </div>
    </div>

    <div id="admin" style="display:none">

        <div class="sidebar">
            <div class="logo">
                <i class='bx bxs-graduation'></i>
                <div class="logo-text">Learn<span>X</span></div>
            </div>
            <i class='bx bx-chevron-left toggle'></i>

            <div class="menu">
                <a onclick="show('dash')" class="active"><i class='bx bxs-dashboard'></i>
                    <div class="text">Dashboard</div>
                </a>
                <a onclick="show('users')"><i class='bx bxs-user-detail'></i>
                    <div class="text">Users</div>
                </a>
                <a onclick="show('courses')"><i class='bx bxs-book-content'></i>
                    <div class="text">Courses</div>
                </a>
                <a onclick="logout()" style="margin: 4px 0 0 0; color:var(--danger)"><i class='bx bx-log-out'></i>
                    <div class="text">Logout</div>
                </a>
            </div>
        </div>

        <div class="content">

            <div id="dash" class="section active">
                <h2>Dashboard Overview</h2>
                <div class="stats-grid">
                    <div class="card-stat">
                        <i class='bx bxs-user'></i>
                        <div>
                            <h3 id="uCount">0</h3>
                            <p>Total Users</p>
                        </div>
                    </div>
                    <div class="card-stat">
                        <i class='bx bxs-book'></i>
                        <div>
                            <h3 id="cCount">0</h3>
                            <p>Active Courses</p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="users" class="section"> 
                <div class="panel-card">
                    <div class="header-flex">
                        <h3>User List</h3>
                        <input type="text" id="searchUser" onkeyup="render()" placeholder="Search users..."
                            style="width:200px; margin:0">
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Email</th>
                                <th>Full Name</th>
                                <th>Active Course</th>
                                <th>Last Active</th>
                                <th>Joined</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="userTable"></tbody>
                    </table>
                </div>
            </div>

            <div id="courses" class="section">
                <div class="panel-card">
                    <h3>Add New Course</h3>
                    <div style="display:flex; gap:10px;">
                        <input id="cname" placeholder="Course Title">
                        <button class="btn btn-green" style="margin-top:10px" onclick="addCourse()">+ Add
                            Course</button>
                    </div>
                </div>

                <div class="panel-card">
                    <h3>Course List</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Course Name</th>
                                <th>ID</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="courseTable"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        /* --- CONFIG & INIT --- */
        let users = [];
        let courses = [];
        let activeSessions = [];

        if (localStorage.login === "yes") loadAdmin();

        /* --- AUTHENTICATION --- */
        function login() {
            const e = document.getElementById("user").value.trim();
            const p = document.getElementById("pass").value;
            const err = document.getElementById("loginError");

            // Simple admin authentication (you can replace with Supabase auth)
            if (e === "admin" && p === "admin123") {
                localStorage.login = "yes";
                loadAdmin();
            } else {
                err.style.display = "block";
                setTimeout(() => { err.style.display = "none"; }, 3000);
            }
        }

        function logout() {
            localStorage.removeItem("login");
            location.reload();
        }

        function loadAdmin() {
            document.getElementById("login").style.display = "none";
            document.getElementById("admin").style.display = "block";
            // Start with collapsed sidebar
            document.querySelector(".sidebar").classList.add("collapsed");
            
            loadCoursesFromSupabase();
            loadUsersFromSupabase();
            setInterval(loadUsersFromSupabase, 5000); // Refresh every 5 seconds
        }
        
        async function loadCoursesFromSupabase() {
            try {
                const { data, error } = await supabaseClient.from('courses').select('id, name, is_live, created_at').order('id', { ascending: true });
                if (error) throw error;
                courses = data || [];
                render();
            } catch(e) {
                console.error("Failed to load courses:", e);
            }
        }

        async function loadUsersFromSupabase() {
            try {
                // Fetch all users
                const { data: userData, error: userError } = await supabaseClient
                    .from('users')
                    .select('id, email, full_name, created_at');
                
                if (userError) {
                    console.error('Error fetching users:', userError);
                    return;
                }
                
                users = userData || [];
                
                // Fetch active sessions
                const { data: sessionData, error: sessionError } = await supabaseClient
                    .from('active_sessions')
                    .select('user_id, course_name, last_activity');
                
                if (sessionError) {
                    console.error('Error fetching sessions:', sessionError);
                } else {
                    activeSessions = sessionData || [];
                }
                
                render();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        /* --- UI LOGIC --- */
        // Sidebar hover animation
        const sidebar = document.querySelector(".sidebar");
        sidebar.addEventListener("mouseenter", () => {
            sidebar.classList.remove("collapsed");
        });
        sidebar.addEventListener("mouseleave", () => {
            sidebar.classList.add("collapsed");
        });

        function show(id) {
            document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
            document.getElementById(id).classList.add("active");
            document.querySelectorAll(".menu a").forEach(a => a.classList.remove("active"));
            event.currentTarget.classList.add("active");
        }

        function showToast(msg) {
            const x = document.getElementById("toast");
            x.innerText = msg;
            x.className = "show";
            setTimeout(() => { x.className = x.className.replace("show", ""); }, 3000);
        }

        /* --- CRUD OPERATIONS --- */

        // ADD USER
        function addUser() {
            const n = document.getElementById("uname");
            const e = document.getElementById("uemail");
            const p = document.getElementById("upass");

            // VALIDATION
            if (n.value.trim() === "" || e.value.trim() === "" || p.value.trim() === "") {
                alert("Please fill all fields!");
                return;
            }

            // Check if email already exists
            if (users.find(u => u.e === e.value.trim())) {
                alert("This email is already registered!");
                return;
            }

            users.push({ id: Date.now(), n: n.value, e: e.value, pass: p.value });
            n.value = ""; e.value = ""; p.value = ""; // Clear inputs
            save();
            showToast("User Added Successfully");
        }

        // ADD COURSE
        async function addCourse() {
            const c = document.getElementById("cname");
            if (c.value.trim() === "") return alert("Course name required");
            try {
                const { error } = await supabaseClient.from('courses').insert({
                    name: c.value,
                    is_live: true,
                    syllabus: []
                });
                if (error) throw error;
                c.value = "";
                await loadCoursesFromSupabase();
                showToast("Course Added");
            } catch(e) {
                alert("Error adding course: " + e.message);
            }
        }
        
        // TOGGLE COURSE LIVE STATUS
        async function toggleCourseLive(courseId) {
            const course = courses.find(c => c.id === courseId);
            if (course) {
                const newStatus = !course.is_live;
                try {
                    const { error } = await supabaseClient.from('courses').update({ is_live: newStatus }).eq('id', courseId);
                    if (error) throw error;
                    await loadCoursesFromSupabase();
                    showToast(newStatus ? "Course is now LIVE" : "Course is now OFFLINE");
                } catch(e) {
                    alert("Error updating status: " + e.message);
                }
            }
        }

        // DELETE FUNCTION — deletes user from auth.users which cascades to all public tables
        async function delUser(userId) {
            if (confirm("Are you sure you want to delete this user? This will permanently remove their account, courses, progress, and notes.")) {
                try {
                    // Call the server-side function that deletes from auth.users
                    // This cascades to public.users, user_courses, user_notes, course_progress, etc.
                    const { data, error } = await supabaseClient
                        .rpc('delete_user_completely', { target_user_id: userId });
                    
                    if (error) {
                        console.error('Error deleting user:', error);
                        alert('Error deleting user: ' + error.message);
                    } else {
                        showToast("User Deleted Successfully");
                        loadUsersFromSupabase();
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('Error deleting user');
                }
            }
        }

        async function delCourse(id) {
            if (confirm("Delete this course?")) {
                try {
                    const { error } = await supabaseClient.from('courses').delete().eq('id', id);
                    if (error) throw error;
                    await loadCoursesFromSupabase();
                    showToast("Course Deleted!");
                } catch(e) {
                    alert('Error deleting course: ' + e.message);
                }
            }
        }

        // SAVE & RENDER
        function save() {
            render();
        }

        function render() {
            const search = document.getElementById("searchUser").value.toLowerCase();
            const uTable = document.getElementById("userTable");
            const cTable = document.getElementById("courseTable");

            // Render Users with Active Course Info
            uTable.innerHTML = "";
            users.forEach(u => {
                if (u.email.toLowerCase().includes(search) || (u.full_name && u.full_name.toLowerCase().includes(search))) {
                    // Find active session for this user
                    const session = activeSessions.find(s => s.user_id === u.id);
                    const activeCourse = session ? session.course_name : 'None';
                    const lastActive = session ? new Date(session.last_activity).toLocaleString() : 'Never';
                    const joinedDate = new Date(u.created_at).toLocaleDateString();
                    
                    uTable.innerHTML += `
        <tr>
          <td><b>${ u.email }</b></td>
          <td>${ u.full_name || '-' }</td>
          <td><span style="background:#4CAF50; padding:4px 12px; border-radius:4px; font-size:12px;">${ activeCourse }</span></td>
          <td style="font-size:12px; color:#888;">${ lastActive }</td>
          <td style="font-size:12px;">${ joinedDate }</td>
          <td>
            <button class="btn btn-red btn-sm" onclick="delUser('${ u.id }')"><i class='bx bx-trash'></i></button>
          </td>
        </tr>`;
                }
            });

            // Render Courses
            cTable.innerHTML = "";
            courses.forEach(c => {
                const statusBadge = c.is_live ? '<span style="background:#4CAF50; color:white; padding:4px 12px; border-radius:4px; font-size:12px; font-weight:bold;">🔴 LIVE</span>' : '<span style="background:#666; color:white; padding:4px 12px; border-radius:4px; font-size:12px; font-weight:bold;">⚪ OFFLINE</span>';
                cTable.innerHTML += `
      <tr>
        <td><b>${ c.name }</b></td>
        <td>#${ c.id }</td>
        <td>${ statusBadge }</td>
        <td>
          <button class="btn btn-green btn-sm" onclick="toggleCourseLive(${ c.id })" style="background:${c.is_live ? '#ff9800' : '#4CAF50'}"><i class='bx bxs-toggle-left'></i> ${c.is_live ? 'DISABLE' : 'ENABLE'}</button>
          <button class="btn btn-red btn-sm" onclick="delCourse(${ c.id })"><i class='bx bx-trash'></i></button>
        </td>
      </tr>`;
            });

            // Update Dashboard Counts
            document.getElementById("uCount").innerText = users.length;
            document.getElementById("cCount").innerText = courses.length;
        }
    </script>

</body>

</html>
