<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="logo.png" type="image/png">
    <title>Register - LearnX-Programming</title>
  <style>
    body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top left, #1a1a1a, #000000);
  color: #fff;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.container {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 30px #4CAF50;
  width: 100%;
  max-width: 350px;
  animation: fadeIn 1s ease-in-out;
}

form {
  display: flex;
  flex-direction: column;
}

.title {
  display: flex;
  justify-content: center;
  margin-bottom: 20px;
  margin-top: 10px;
  font-size: clamp(20px, 5vw, 24px);
  color: #4CAF50;
  animation: slideDown 0.6s ease;
}

input {
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-radius: 8px;
  background: #222;
  color: white;
  transition: 0.3s;
  font-size: 16px;
}
input:focus {
  outline: none;
  box-shadow: 0 0 8px #4CAF50;
}

button {
  background: #4CAF50;
  border: none;
  margin-top: 20px;
  padding: 12px;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s ease;
  font-size: 16px;
}

button:hover {
  background: #45a049;
}

a {
  text-align: center;
  margin-top: 15px;
  color: white;
  text-decoration: none;
  font-size: 14px;
}

a:hover {
  color: #4CAF50;
}

.msg {
  text-align: center;
  color: #18c20f;
  font-size: 14px;
  margin-top: 10px;
}

/* Animations */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

@keyframes slideDown {
  from {transform: translateY(-30px); opacity: 0;}
  to {transform: translateY(0); opacity: 1;}
}

/* Tablet */
@media (max-width: 768px) {
  .container {
    padding: 20px;
    max-width: 100%;
  }
}

/* Mobile */
@media (max-width: 480px) {
  body {
    padding: 10px;
  }
  
  .container {
    padding: 20px 15px;
    border-radius: 12px;
  }

  .title {
    font-size: 22px;
  }

  input {
    padding: 12px 10px;
    font-size: 16px;
  }

  button {
    padding: 12px;
    font-size: 16px;
  }
}
</style>
</head>
<body>
  <div class="container">
      <h2 class="title">Sign-Up</h2>
      <form onsubmit="handleRegister(event)">
        <input id="fullName" type="text" placeholder="Full Name" required />
        <input id="email" type="email" placeholder="Email" required />
        <input id="password" type="password" placeholder="Password" required />
        <input id="confirmPassword" type="password" placeholder="Confirm Password" required />
        <button type="submit">Sign-Up</button>
        <div id="message" class="msg"></div>
      </form>
      <a href="login.html">Already Signed-Up? Login</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    let isSubmitting = false;

    async function handleRegister(event) {
      event.preventDefault();
      
      // Prevent multiple submissions
      if (isSubmitting) return;
      isSubmitting = true;
      
      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const messageDiv = document.getElementById('message');
      const submitBtn = document.querySelector('button[type="submit"]');

      // Disable button during submission
      submitBtn.disabled = true;
      submitBtn.style.opacity = '0.6';
      submitBtn.style.cursor = 'not-allowed';

      // Validation
      if (!fullName) {
        messageDiv.textContent = 'Please enter your full name';
        messageDiv.style.color = '#ff6b6b';
        submitBtn.disabled = false;
        submitBtn.style.opacity = '1';
        submitBtn.style.cursor = 'pointer';
        isSubmitting = false;
        return;
      }

      if (password.length < 6) {
        messageDiv.textContent = 'Password must be at least 6 characters';
        messageDiv.style.color = '#ff6b6b';
        submitBtn.disabled = false;
        submitBtn.style.opacity = '1';
        submitBtn.style.cursor = 'pointer';
        isSubmitting = false;
        return;
      }

      if (password !== confirmPassword) {
        messageDiv.textContent = 'Passwords do not match';
        messageDiv.style.color = '#ff6b6b';
        submitBtn.disabled = false;
        submitBtn.style.opacity = '1';
        submitBtn.style.cursor = 'pointer';
        isSubmitting = false;
        return;
      }

      try {
        messageDiv.textContent = 'Creating account...';
        messageDiv.style.color = '#4CAF50';

        // Sign up with Supabase Auth
        const { data: authData, error: authError } = await supabaseClient.auth.signUp({
          email,
          password
        });

        if (authError) {
          messageDiv.textContent = authError.message;
          messageDiv.style.color = '#ff6b6b';
          submitBtn.disabled = false;
          submitBtn.style.opacity = '1';
          submitBtn.style.cursor = 'pointer';
          isSubmitting = false;
          return;
        }

        if (!authData.user) {
          messageDiv.textContent = 'Failed to create account';
          messageDiv.style.color = '#ff6b6b';
          submitBtn.disabled = false;
          submitBtn.style.opacity = '1';
          submitBtn.style.cursor = 'pointer';
          isSubmitting = false;
          return;
        }

        // Save user profile to public.users table
        const { error: profileError } = await supabaseClient
          .from('users')
          .insert([
            {
              id: authData.user.id,
              email,
              full_name: fullName,
              created_at: new Date().toISOString(),
              updated_at: new Date().toISOString()
            }
          ]);

        if (profileError) {
          messageDiv.textContent = 'Account created but profile save failed: ' + profileError.message;
          messageDiv.style.color = '#ff9800';
          setTimeout(() => window.location.href = 'index.html', 3000);
          return;
        }

        messageDiv.textContent = 'Registration successful! Redirecting to login...';
        messageDiv.style.color = '#4CAF50';
        
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1000);

      } catch (error) {
        messageDiv.textContent = 'Error: ' + error.message;
        messageDiv.style.color = '#ff6b6b';
        submitBtn.disabled = false;
        submitBtn.style.opacity = '1';
        submitBtn.style.cursor = 'pointer';
        isSubmitting = false;
      }
    }
  </script>
</body>
</html>
