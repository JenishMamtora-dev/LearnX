<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="logo.png" type="image/png">
  <title>Course | LearnX</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Roboto', sans-serif;
      background: #111; 
      color: #e0e0e0;
      min-height: 100vh;
    }
    .course-layout {
      display: flex;
      min-height: 100vh;
      flex-direction: row;
    }
    .course-sidebar {
      width: clamp(200px, 25vw, 270px);
      background: #181818;
      border-right: 1.5px solid #232323;
      padding: clamp(15px, 3vw, 32px) clamp(12px, 2vw, 18px);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      position: relative;
    }
    .sidebar-back {
      background: none;
      border: none;
      color: #ccc;
      font-size: clamp(0.9rem, 1.5vw, 1.1rem);
      display: flex;
      align-items: center;
      margin-bottom: 28px;
      cursor: pointer;
      padding: 7px 0;
      transition: color 0.18s;
    }
    .sidebar-back:hover { color: #4CAF50; }
    .sidebar-chapters h3 { 
      color: #fff; 
      margin-bottom: 16px; 
      font-size: clamp(1rem, 2vw, 1.2rem);
    }
    .chapter-list { 
      list-style: none; 
      padding: 0; 
      margin: 0; 
    }
    .chapter-item {
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 8px;
      color: #bbb;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      display: flex;
      align-items: center;
      font-size: clamp(0.85rem, 1.5vw, 1rem);
      cursor: pointer;
      transition: all 0.15s;
    }
    .chapter-item:hover:not(.locked) { background: #232323; color: #fff; }
    .chapter-item.active {
      background: #23223a;
      color: #fff;
    }
    .chapter-item.locked {
      color: #666;
      cursor: not-allowed;
    }
    .chapter-item i { margin-left: 8px; }
    .chapter-item .bx-check-circle { color: #4CAF50; }
    .chapter-item.locked .bxs-lock { color: #444; }
    .course-main {
      flex: 1;
      background: #111;
      padding: clamp(20px, 3vw, 32px);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .course-tabs {
      padding-left: clamp(10px, 2vw, 30px);
      display: flex;
      gap: clamp(15px, 3vw, 32px);
      border-bottom: 1.5px solid #232323;
      margin-bottom: clamp(15px, 3vw, 32px);
      overflow-x: auto;
    }
    .course-tab {
      padding: 12px 0;
      font-size: clamp(0.85rem, 1.5vw, 1.08rem);
      color: #888;
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 2.5px solid transparent;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .course-tab:hover { color: #4CAF50; }
    .course-tab.active {
      color: #4CAF50;
      border-bottom: 2.5px solid #4CAF50;
    }
    .chapter-title { 
      font-size: clamp(1.5rem, 5vw, 2rem); 
      padding-left: clamp(10px, 2vw, 30px);
      margin-bottom: 24px; 
      color: #fff;
      font-family: 'Poppins', sans-serif;
    }
    .chapter-content { 
      font-size: clamp(0.95rem, 1.5vw, 1.15rem); 
      padding-left: clamp(10px, 2vw, 30px);
      color: #ccc; 
      line-height: 1.8;
      margin-bottom: 24px;
      white-space: pre-wrap;
    }
    .chapter-section {
      padding-left: clamp(10px, 2vw, 30px);
      padding-right: clamp(10px, 2vw, 20px);
      margin-bottom: 28px;
    }
    .chapter-section h3 {
      color: #4CAF50;
      margin-bottom: 12px;
      font-size: clamp(1rem, 2vw, 1.2rem);
      font-family: 'Poppins', sans-serif;
    }
    .chapter-section p {
      color: #ccc;
      line-height: 1.8;
      margin-bottom: 12px;
      font-size: clamp(0.95rem, 1.5vw, 1.05rem);
    }
    .syntax-box {
      background: #181818;
      border-left: 4px solid #4CAF50;
      padding: 12px 16px;
      border-radius: 5px;
      font-family: 'Courier New', monospace;
      color: #4CAF50;
      margin-bottom: 12px;
      overflow-x: auto;
      font-size: clamp(0.85rem, 1.2vw, 1rem);
    }
    .examples-list, .notes-list {
      margin-left: 20px;
      color: #ccc;
    }
    .examples-list li, .notes-list li {
      margin-bottom: 8px;
      line-height: 1.6;
      font-size: clamp(0.9rem, 1.5vw, 1rem);
    }
    .chapter-notes h3 { 
      margin-bottom: 12px; 
      padding-left: clamp(10px, 2vw, 30px);
      font-size: clamp(1rem, 2vw, 1.2rem);
    }
    #noteInput {
      width: clamp(100%, -135px + 100%, 80%);
      min-height: 140px;
      background: #181818;
      border: 1.5px solid #232323;
      color: #e0e0e0;
      border-radius: 7px;
      padding: 14px 18px;
      font-size: 1rem;
      margin-left: clamp(10px, 2vw, 10px);
      margin-bottom: 10px;
      resize: vertical;
      font-family: 'Courier New', monospace;
      max-width: 100%;
    }
    #noteInput:focus { 
      outline: none;
      border-color: #4CAF50;
    }
    #saveMsg {
      color: #4CAF50;
      display: none;
      font-weight: 500;
    }
    .chapter-quiz { 
      padding-left: clamp(10px, 2vw, 30px);
      padding-right: clamp(10px, 2vw, 30px);
      min-height: 300px;
    }
    .chapter-quiz h3 { 
      margin-bottom: 24px;
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      color: #fff;
    }
    .quiz-option {
      background: #181818;
      border: 1.5px solid #232323;
      color: #e0e0e0;
      border-radius: 7px;
      padding: 14px 18px;
      margin-bottom: 12px;
      cursor: pointer;
      font-size: clamp(0.9rem, 1.5vw, 1rem);
      transition: all 0.15s;
      width: 100%;
      max-width: 600px;
      text-align: left;
      display: block;
    }
    .quiz-option:hover:not(.correct):not(.wrong) { 
      background: #232323;
      border-color: #4CAF50;
    }
    .quiz-option.correct { 
      background: #193c1a; 
      border-color: #4CAF50; 
      color: #4CAF50;
    }
    .quiz-option.wrong { 
      background: #3c1919; 
      border-color: #ef4444; 
      color: #ef4444;
    }
    #quizResult { 
      margin-top: 16px; 
      font-weight: 500;
      font-size: clamp(0.9rem, 1.5vw, 1rem);
    }
    .chapter-resources { 
      color: #aaa; 
      font-size: clamp(0.9rem, 1.5vw, 1rem); 
      margin-left: clamp(10px, 2vw, 30px);
    }
    .course-name-header {
      font-size: clamp(1rem, 2vw, 1.3rem);
      font-weight: 600;
      color: #fff;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1.5px solid #232323;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .course-layout {
        flex-direction: column;
      }
      .course-sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1.5px solid #232323;
        padding: 15px;
        order: 2;
      }
      .course-main {
        order: 1;
        padding: clamp(15px, 2vw, 20px);
      }
      .course-tabs {
        padding-left: clamp(5px, 1vw, 10px);
        gap: clamp(10px, 2vw, 15px);
        margin-bottom: clamp(10px, 2vw, 15px);
      }
      .chapter-title {
        padding-left: clamp(5px, 1vw, 10px);
      }
      .chapter-content {
        padding-left: clamp(5px, 1vw, 10px);
        font-size: 1rem;
      }
      .chapter-section {
        padding-left: clamp(5px, 1vw, 10px);
        padding-right: clamp(5px, 1vw, 10px);
      }
      #noteInput {
        width: 100%;
        margin-left: 0;
      }
    }

    @media (max-width: 480px) {
      .course-layout {
        flex-direction: column;
      }
      .course-sidebar {
        padding: 10px;
        max-height: 200px;
      }
      .course-main {
        padding: 10px;
      }
      .course-tabs {
        padding-left: 5px;
        gap: 8px;
        font-size: 0.85rem;
      }
      .course-tab {
        padding: 8px 0;
        font-size: 0.8rem;
      }
      .chapter-title {
        font-size: 1.3rem;
        padding-left: 5px;
      }
      .chapter-content {
        font-size: 0.95rem;
        padding-left: 5px;
      }
      .chapter-section {
        padding-left: 5px;
        padding-right: 5px;
      }
      .chapter-section h3 {
        font-size: 1rem;
      }
      .chapter-section p {
        font-size: 0.9rem;
      }
      #noteInput {
        min-height: 120px;
        padding: 10px;
        font-size: 0.9rem;
      }
      .chapter-quiz {
        padding-left: 5px;
        padding-right: 5px;
      }
      .quiz-option {
        padding: 12px 14px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="course-layout">
    <aside class="course-sidebar">
      <div class="course-name-header" id="courseNameHeader"></div>
      <button class="sidebar-back" onclick="window.location='user1.html'"><i class='bx bx-arrow-back'></i> Back</button>
      <div class="sidebar-chapters">
        <h3>Chapters</h3>
        <ul class="chapter-list" id="chapterList"></ul>
      </div>
    </aside>

    <main class="course-main">
      <div class="course-tabs">
        <button class="course-tab active" id="tab-read" onclick="switchTab('read')"><i class='bx bx-book-open'></i> Read</button>
        <button class="course-tab" id="tab-notes" onclick="switchTab('notes')"><i class='bx bx-notepad'></i> My Notes</button>
        <button class="course-tab" id="tab-quiz" onclick="switchTab('quiz')"><i class='bx bx-bulb'></i> Quiz</button>
        <button class="course-tab" id="tab-resources" onclick="switchTab('resources')"><i class='bx bx-link'></i> Resources</button>
      </div>

      <div id="view-read">
        <div class="chapter-title" id="chapterTitle"></div>
        <div class="chapter-section" id="shortDescSection" style="display:none;">
          <h3>Overview</h3>
          <p id="shortDescription"></p>
        </div>
        <div class="chapter-section" id="detailedDefSection" style="display:none;">
          <h3>Detailed Definition</h3>
          <p id="detailedDefinition"></p>
        </div>
        <div class="chapter-section" id="syntaxSection" style="display:none;">
          <h3>Syntax</h3>
          <div class="syntax-box" id="syntax"></div>
        </div>
        <div class="chapter-section" id="examplesSection" style="display:none;">
          <h3>Examples</h3>
          <ul class="examples-list" id="examplesList"></ul>
        </div>
        <div class="chapter-section" id="notesSection" style="display:none;">
          <h3>Key Points</h3>
          <ul class="notes-list" id="notesList"></ul>
        </div>
      </div>

      <div id="view-notes" style="display:none">
        <div class="chapter-notes">
          <h3>My Notes</h3>
          <textarea id="noteInput" placeholder="Type your notes here..."></textarea>
          <div id="saveMsg"><i class='bx bx-check'></i> Saved</div>
        </div>
      </div>

      <div id="view-quiz" style="display:none">
        <div class="chapter-quiz">
          <div id="quizContainer"></div>
          <div id="quizResult"></div>
        </div>
      </div>

      <div id="view-resources" style="display:none">
        <div class="chapter-resources" id="resourcesContent">No extra resources for this chapter.</div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    // Get course name from URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const courseName = urlParams.get('course');
    
    // Wait for everything to be loaded from Supabase
    let chapters = [];
    let activeChapter = 0;
    
    // Notes structure globally is allNotes -> user -> course -> chapter
    // But this page uses an older courseNotes -> chapter structure for current course locally
    // Let's align it to the global allNotes structure used in index.js for cross-page compatibility
    let allNotes = JSON.parse(localStorage.getItem('allNotes')) || {};
    let progress = JSON.parse(localStorage.getItem('progress')) || {};
    
    let activeUserRaw = localStorage.getItem('activeUser');
    let uKey = activeUserRaw;
    let userId = null;
    try {
       if (activeUserRaw) {
         let parsed = JSON.parse(activeUserRaw);
         if (parsed && typeof parsed === 'object') {
             uKey = parsed.email || parsed;
             userId = parsed.id;
         }
       }
    } catch(e) {}
    
    let activeUser = uKey; // For backwards compat

    // Initialize tracking structures
    if (!progress[uKey]) progress[uKey] = {};
    if (!progress[uKey][courseName]) progress[uKey][courseName] = [];
    
    if (!allNotes[uKey]) allNotes[uKey] = {};
    if (!allNotes[uKey][courseName]) allNotes[uKey][courseName] = {};

    // Use mapped notes for this specific course explicitly
    let notes = allNotes[uKey][courseName];

    // Set course name in sidebar header
    document.getElementById('courseNameHeader').textContent = courseName || 'Course';

    function renderSidebar() {
      const list = document.getElementById('chapterList');
      list.innerHTML = '';
      chapters.forEach((ch, i) => {
        const isLocked = i > 0 && !progress[activeUser][courseName].includes(i - 1);
        const isDone = progress[activeUser][courseName].includes(i);
        const classList = `chapter-item${activeChapter === i ? ' active' : ''}${isLocked ? ' locked' : ''}`;
        const disabled = isLocked ? 'disabled tabindex="-1"' : '';
        list.innerHTML += `<li><button class="${classList}" ${disabled} onclick="selectChapter(${i})">${ch.title}${isDone ? '<i class="bx bx-check-circle"></i>' : ''}${isLocked ? '<i class="bx bxs-lock"></i>' : ''}</button></li>`;
      });
    }

    function renderChapter() {
      if (chapters.length === 0) return;
      const ch = chapters[activeChapter];
      document.getElementById('chapterTitle').textContent = ch.title;
      document.getElementById('noteInput').value = notes[activeChapter] || '';
      
      // Display short description
      const shortDescSection = document.getElementById('shortDescSection');
      if (ch.shortDescription) {
        document.getElementById('shortDescription').textContent = ch.shortDescription;
        shortDescSection.style.display = 'block';
      } else {
        shortDescSection.style.display = 'none';
      }
      
      // Display detailed definition
      const detailedDefSection = document.getElementById('detailedDefSection');
      if (ch.detailedDefinition) {
        document.getElementById('detailedDefinition').textContent = ch.detailedDefinition;
        detailedDefSection.style.display = 'block';
      } else {
        detailedDefSection.style.display = 'none';
      }
      
      // Display syntax
      const syntaxSection = document.getElementById('syntaxSection');
      if (ch.syntax) {
        document.getElementById('syntax').textContent = ch.syntax;
        syntaxSection.style.display = 'block';
      } else {
        syntaxSection.style.display = 'none';
      }
      
      // Display examples
      const examplesSection = document.getElementById('examplesSection');
      const examplesList = document.getElementById('examplesList');
      if (ch.examples && ch.examples.length > 0) {
        examplesList.innerHTML = '';
        ch.examples.forEach(ex => {
          const li = document.createElement('li');
          li.textContent = ex;
          examplesList.appendChild(li);
        });
        examplesSection.style.display = 'block';
      } else {
        examplesSection.style.display = 'none';
      }
      
      // Display notes/key points
      const notesSection = document.getElementById('notesSection');
      const notesList = document.getElementById('notesList');
      if (ch.notes && ch.notes.length > 0) {
        notesList.innerHTML = '';
        ch.notes.forEach(note => {
          const li = document.createElement('li');
          li.textContent = note;
          notesList.appendChild(li);
        });
        notesSection.style.display = 'block';
      } else {
        notesSection.style.display = 'none';
      }
      
      // Display quiz
      const quizContainer = document.getElementById('quizContainer');
      const quizResult = document.getElementById('quizResult');
      if (ch.quiz && ch.quiz.q && ch.quiz.opts && ch.quiz.opts.length > 0) {
        let html = `<h3>${ch.quiz.q}</h3>`;
        ch.quiz.opts.forEach((op, i) => {
          const isCorrect = op.ok === true || op.ok === 'true';
          html += `<div class="quiz-option" onclick="checkQuiz(this, ${isCorrect})">${String.fromCharCode(65 + i)}. ${op.t}</div>`;
        });
        quizContainer.innerHTML = html;
        quizResult.innerHTML = '';
      } else {
        quizContainer.innerHTML = '<p style="color: #888; padding: 20px;">No quiz available for this chapter.</p>';
        quizResult.innerHTML = '';
      }
    }

    window.selectChapter = (i) => {
      activeChapter = i;
      renderSidebar();
      renderChapter();
      switchTab('read');
    };

    window.switchTab = (tab) => {
      ['read', 'notes', 'quiz', 'resources'].forEach(t => {
        const view = document.getElementById('view-' + t);
        const btn = document.getElementById('tab-' + t);
        view.style.display = t === tab ? 'block' : 'none';
        btn.classList.toggle('active', t === tab);
      });
    };

    window.saveNote = async () => {
      notes[activeChapter] = document.getElementById('noteInput').value;
      allNotes[uKey][courseName] = notes;
      localStorage.setItem('allNotes', JSON.stringify(allNotes));
      
      if (userId) {
          try {
             await supabaseClient.from('user_notes').upsert({
                 user_id: userId,
                 course_name: courseName,
                 chapter_index: activeChapter,
                 note_content: notes[activeChapter]
             }, { onConflict: 'user_id,course_name,chapter_index' });
          } catch(e) { console.error(e); }
      }
      
      const msg = document.getElementById('saveMsg');
      msg.style.display = 'block';
      setTimeout(() => msg.style.display = 'none', 1200);
      renderSidebar();
    };

    window.checkQuiz = (el, isCorrect) => {
      if (isCorrect) {
        el.classList.add('correct');
        document.getElementById('quizResult').innerHTML = "<span style='color:#4CAF50'>✓ Correct! Next chapter unlocked!</span>";
        document.querySelectorAll('.quiz-option').forEach(e => e.style.pointerEvents = 'none');
        setTimeout(async () => {
          // Mark current chapter as completed
          if (!progress[uKey][courseName].includes(activeChapter)) {
            progress[uKey][courseName].push(activeChapter);
            localStorage.setItem('progress', JSON.stringify(progress));
            
            if (userId) {
                try {
                    await supabaseClient.from('course_progress').upsert({
                        user_id: userId,
                        course_name: courseName,
                        chapter_index: activeChapter,
                        completed: true,
                        completed_at: new Date().toISOString()
                    }, { onConflict: 'user_id,course_name,chapter_index' });
                } catch(e) { console.error('Error saving quiz progress', e); }
            }
          }
          window.saveNote();
          if (activeChapter + 1 < chapters.length) window.selectChapter(activeChapter + 1);
        }, 1200);
      } else {
        el.classList.add('wrong');
        document.getElementById('quizResult').innerHTML = "<span style='color:#ef4444'>✗ Wrong! Try again.</span>";
      }
    };

    async function loadDataAndRender() {
        try {
            // Try to load syllabus from Supabase first
            const { data: courseDataSupabase, error } = await supabaseClient
                .from('courses')
                .select('syllabus')
                .eq('name', courseName)
                .single();
                
            let syllabusData = null;
            if (courseDataSupabase && courseDataSupabase.syllabus) {
                syllabusData = courseDataSupabase.syllabus;
            } else {
                // Fallback to localStorage coursesData
                const coursesData = JSON.parse(localStorage.getItem('coursesData')) || [];
                const courseDataLocal = coursesData.find(c => c.name === courseName);
                if (courseDataLocal && courseDataLocal.syllabus) {
                    syllabusData = courseDataLocal.syllabus;
                }
            }
            
            if (syllabusData) {
                chapters = syllabusData.map(item => ({
                    title: item.t,
                    shortDescription: item.shortDescription,
                    detailedDefinition: item.detailedDefinition,
                    syntax: item.syntax,
                    examples: item.examples,
                    notes: item.notes,
                    content: item.c,
                    quiz: item.quiz
                }));
            } else {
                chapters = [{
                    title: "Course Not Found",
                    content: "The requested course data could not be loaded. Please go back to Home."
                }];
            }
            
            renderSidebar();
            renderChapter();
            
        } catch (e) {
            console.error("Failed to load course", e);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadDataAndRender();
      document.getElementById('noteInput').addEventListener('input', window.saveNote);
    });
  </script>
</body>
</html>
