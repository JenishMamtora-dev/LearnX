<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>Feedback - LearnX Pro</title>
    <style>
        :root {
            --bg: #050505;
            --card: #141414;
            --border: #222;
            --text: #e0e0e0;
            --text-muted: #888;
            --accent: #6366f1;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 100%;
            max-width: 350px;
            padding: clamp(20px, 5vw, 30px);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-align: center;
        }

        .login-box h2 {
            font-size: clamp(18px, 3vw, 24px);
            margin-bottom: 20px;
            color: white;
        }

        .inp {
            width: 100%;
            padding: clamp(10px, 2vw, 12px);
            background: black;
            border: 1px solid var(--border);
            color: white;
            border-radius: 6px;
            margin: clamp(10px, 2vw, 15px) 0;
            outline: none;
            font-size: clamp(12px, 1.5vw, 14px);
            box-sizing: border-box;
            resize: vertical;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            font-size: clamp(11px, 1.5vw, 13px);
            display: inline-flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
            width: 100%;
            margin-top: 5px;
        }

        .btn-primary:hover {
            background: #4f46e5;
        }
    </style>
</head>
<body>
    <div style="display: flex; justify-content: center; align-items: center; gap: 60px; padding: 40px; flex-wrap: wrap; width: 100%; max-width: 900px; margin: auto;">
        <!-- Left: Tagline -->
        <div style="flex: 1; min-width: 240px; max-width: 380px;">
            <p style="font-size: 12px; font-weight: 600; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; margin-bottom: 12px;">Your Voice Matters</p>
            <h2 style="font-size: clamp(20px, 3vw, 30px); font-weight: 700; color: white; line-height: 1.35; margin-bottom: 16px;">We'd love to hear your thoughts—your feedback makes us better!</h2>
            <p style="font-size: 14px; color: var(--text-muted); line-height: 1.7;">Share your experience, suggestions, or any issues. Every message helps us build a better learning platform for you.</p>
            <div style="margin-top: 24px; display: flex; flex-direction: column; gap: 14px;">
                <div style="display: flex; align-items: center; gap: 12px; color: #aaa; font-size: 14px;">
                    <span style="width: 36px; height: 36px; border-radius: 50%; background: #1a1a1a; border: 1px solid #333; display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 18px;">✉</span>
                    We read every single message
                </div>
                <div style="display: flex; align-items: center; gap: 12px; color: #aaa; font-size: 14px;">
                    <span style="width: 36px; height: 36px; border-radius: 50%; background: #1a1a1a; border: 1px solid #333; display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 18px;">🚀</span>
                    Your ideas shape our roadmap
                </div>
            </div>
        </div>
        <!-- Right: Feedback Form -->
        <div class="login-box">
            <h2>Submit Feedback</h2>
            <input id="name" class="inp" placeholder="Your Name" required>
            <input id="email" class="inp" type="email" placeholder="Your Email" required>
            <textarea id="message" class="inp" rows="4" placeholder="Your Message" required></textarea>
            <button class="btn-primary" id="submitFeedbackBtn">Submit Feedback</button>
            <p style="color:#ff6b6b; font-size:12px; display:none; text-align:center; margin-top:10px;" id="loginError"></p>
            <p style="color:#10b981; font-size:12px; display:none; text-align:center; margin-top:10px;" id="successMsg"></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="feedback.js"></script>
</body>
</html>
